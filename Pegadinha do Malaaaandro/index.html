<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pegadinha do Malaaaandro</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    main {
      width: min(90vw, 520px);
      padding: 32px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #fff;
      text-align: center;
      box-shadow: 8px 8px 0 #222;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    #resultado {
      min-height: 70px;
      margin: 24px 0;
      font-size: 22px;
      font-weight: bold;
      line-height: 1.4;
    }

    button {
      padding: 12px 18px;
      border: 0;
      border-radius: 6px;
      background: #222;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pegadinha do Malaaaandro!!</h1>
    <p id="resultado"></p>
    <button type="button" onclick="perguntarNome()">Tentar de novo</button>
  </main>

  <script>
    function perguntarNome() {
      const nome = prompt("Qual e o seu nome?");
      const resultado = document.getElementById("resultado");

      if (nome && nome.trim()) {
        resultado.textContent = `${nome.trim()}, voce caiu na Pegadinha do Malaaaandro!!`;
      } else {
        resultado.textContent = "Sem nome? Caiu do mesmo jeito na Pegadinha do Malaaaandro!!";
      }
    }

    perguntarNome();
  </script>
</body>
</html>
